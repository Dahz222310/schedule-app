            display: grid;

        .day-cell {
            min-height: 60px; padding: 6px 2px;

            font-size: 11px; font-weight: bold; display: flex; flex-direction: column; justify-content: center;
            transition: all 0.2s; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .day-cell::before { content: "🍔"; font-size: 18px; margin-bottom: 1px; }
        .day-cell:hover:not(.inactive):not(.final-schedule) { transform: scale(1.02); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .day-cell.work { background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); border-color: #28a745; color: #155724; }
        .day-cell.work::before { content: "✅🍔"; }
        .day-cell.off { background: linear-gradient(135deg, #f8d7da 0%, #f1b0b7 100%); border-color: #dc3545; color: #721c24; }
        .day-cell.off::before { content: "❌🍔"; }
        .day-cell.inactive { background: #e9ecef; border-color: #adb5bd; cursor: not-allowed; opacity: 0.5; }
        .day-cell.inactive::before { content: "🔒"; }
        .final-schedule .day-cell { background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); border: 3px solid #ffc107; cursor: default; }
        .final-schedule .day-cell::before { content: "🎯"; }
        @media print { body { background: white; margin: 0; } .sidebar { display: none; } .screen:not(.active) { display: none !important; } }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { order: -1; margin-bottom: 20px; }
        }
    </style>
